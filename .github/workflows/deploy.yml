name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ jean }}
          password: ${{ jean12 }}
          script: |
            cd ~/todo-list-jean
            git pull
            cd backend
            npm install
            pm2 restart todo-list-jean